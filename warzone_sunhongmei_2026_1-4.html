<meta charset="UTF-8">

<title>孙红梅战区 2026年1-4月 损益分析</title>
<style>
:root {
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #1a1a2e;
  --text2: #555;
  --primary: #e74c3c;
  --secondary: #2ecc71;
  --warning: #f39c12;
  --info: #3498db;
  --border: #e0e0e0;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { font-size: 28px; margin: 0 0 8px; }
.header p { color: var(--text2); font-size: 15px; margin: 0; }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.kpi-card h3 { font-size: 13px; color: var(--text2); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-card .value { font-size: 28px; font-weight: 700; margin: 0; }
.kpi-card .change { font-size: 13px; margin-top: 4px; }
.kpi-card .change.up { color: var(--secondary); }
.kpi-card .change.down { color: var(--primary); }

/* Table */
.table-wrap { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 24px; }
.table-wrap h2 { font-size: 18px; margin: 0; padding: 16px 20px; border-bottom: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #f0f0f0; }
th { background: #fafbfc; font-weight: 600; color: var(--text2); text-align: right; position: sticky; top: 0; }
td:first-child, th:first-child { text-align: left; font-weight: 500; }
tr:hover { background: #f8f9fa; }

/* Trend charts */
.chart-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 24px; }
.chart-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.chart-card h2 { font-size: 16px; margin: 0 0 16px; }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.badge-success { background: #d4edda; color: #155724; }
.badge-danger { background: #f8d7da; color: #721c24; }
.badge-warning { background: #fff3cd; color: #856404; }

/* Section */
.section { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 24px; }
.section h2 { font-size: 18px; margin: 0 0 16px; }

/* Insights */
.insight-list { list-style: none; padding: 0; margin: 0; }
.insight-list li { padding: 10px 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; gap: 10px; }
.insight-list li:last-child { border-bottom: none; }
.insight-icon { font-size: 18px; flex-shrink: 0; }
.insight-text { font-size: 14px; }

/* Store detail */
.store-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
.store-tab { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.store-tab:hover { background: var(--bg); }
.store-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.store-detail { display: none; }
.store-detail.active { display: block; }

/* Mini sparkline */
.sparkline { display: flex; align-items: flex-end; gap: 2px; height: 30px; }
.sparkline-bar { flex: 1; background: var(--info); border-radius: 2px 2px 0 0; min-height: 2px; opacity: 0.7; }
.sparkline-bar.current { background: var(--primary); opacity: 1; }
</style>
</head>

// Helper functions
const fmt = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (typeof n === 'string') return n;
  return n.toLocaleString('zh-CN', {maximumFractionDigits: 1});
};
const fmtPct = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n * 100).toFixed(1) + '%';
};
const fmtMoney = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '¥' + (n / 10000).toFixed(1) + '万';
};

// Process data
function processData() {
  const stores = [];
  for (const [name, data] of Object.entries(storesData)) {
    const months = data.months.slice(0, 4); // Only 1-4月
    const m4 = months[3] || {};
    
    // Calculate metrics
    const revenue = m4.revenue_pre?.actual_amount || 0;
    const budget = m4.revenue_pre?.budget_amount || 0;
    const achievement = budget > 0 ? revenue / budget : 0;
    const margin = m4.margin_post?.actual_amount || 0;
    const marginBudget = m4.margin_post?.budget_amount || 0;
    const marginRate = m4.margin_post?.actual_pct || (revenue > 0 ? margin / revenue : 0);
    const marginBudgetRate = m4.margin_post?.budget_pct || (budget > 0 ? marginBudget / budget : 0);
    const marginDiff = marginRate - marginBudgetRate;
    const salary = m4.salary?.actual_amount || 0;
    const salaryPct = revenue > 0 ? salary / revenue : 0;
    const adminExpense = m4.admin_expense?.actual_amount || 0;
    const cost = m4.cost?.actual_amount || 0;
    
    // Monthly trend
    const revenueTrend = months.map(m => m.revenue_pre?.actual_amount || 0);
    const marginTrend = months.map(m => m.margin_post?.actual_pct || 0);
    
    stores.push({
      name, data,
      revenue, budget, achievement,
      marginRate, marginBudgetRate, marginDiff,
      salaryPct, adminExpense, cost,
      revenueTrend, marginTrend,
      months
    });
  }
  return stores.sort((a, b) => b.revenue - a.revenue);
}

const top3 = stores.slice(0, 3).map(s => s.name);
const bottom3 = stores.slice(-3).map(s => s.name);
insights.push(`🏆 <strong>营收领跑</strong>：${top3.join('、')} 为4月营收前三强，合计贡献战区 ${fmtPct(stores.slice(0,3).reduce((s,st)=>s+st.revenue,0)/totalRevenue)} 营收`);
insights.push(`⚠️ <strong>营收承压</strong>：${bottom3.join('、')} 4月营收排名靠后，需重点关注客流与转化率`);

// 2. Budget achievement
const underBudgetStores = stores.filter(s => s.achievement < 1);
if (underBudgetStores.length > 0) {
  insights.push(`📉 <strong>预算缺口</strong>：${underBudgetStores.length}家门店未达预算（${underBudgetStores.map(s => s.name).join('、')}），合计缺口 ${fmtMoney(underBudgetStores.reduce((s,st)=>s+(st.budget-st.revenue),0))}`);
}

// 3. Margin issues
const lowMargin = stores.filter(s => s.marginRate < 0.50);
if (lowMargin.length > 0) {
  insights.push(`🔴 <strong>毛利率预警</strong>：${lowMargin.length}家门店毛利率低于50%（${lowMargin.map(s => s.name).join('、')}），建议核查原料成本与报废率`);
}

// 4. Salary concerns
const highSalary = stores.filter(s => s.salaryPct > 0.20);
if (highSalary.length > 0) {
  insights.push(`💸 <strong>薪资占比偏高</strong>：${highSalary.length}家门店薪资占比超20%（${highSalary.map(s => s.name).join('、')}），关注人效与排班合理性`);
}

// 5. Margin trend
const marginDeclining = stores.filter(s => {
  const m = s.marginTrend;
  return m.length >= 2 && m[m.length-1] < m[0];
});
if (marginDeclining.length > 0) {
  insights.push(`📉 <strong>毛利下滑</strong>：${marginDeclining.length}家门店毛利率呈下滑趋势，需排查成本管控`);
}

// 6. Best margin improvers
const marginImprovers = stores.filter(s => s.marginDiff > 0).sort((a, b) => b.marginDiff - a.marginDiff).slice(0, 3);
if (marginImprovers.length > 0) {
  insights.push(`✅ <strong>毛利提升</strong>：${marginImprovers.map(s => s.name + '(' + fmtPct(s.marginDiff) + ')').join('、')} 毛利率优于预算`);
}

document.getElementById('insightList').innerHTML = insights.map(i => `<li><span class="insight-icon">•</span><span class="insight-text">${i}</span></li>`).join('');

// Store Tabs & Details
const tabsContainer = document.getElementById('storeTabs');
const detailsContainer = document.getElementById('storeDetails');

stores.forEach((s, i) => {
  const tab = document.createElement('div');
  tab.className = 'store-tab' + (i === 0 ? ' active' : '');
  tab.textContent = s.name;
  tab.onclick = () => {
    document.querySelectorAll('.store-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.store-detail').forEach(d => d.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('detail-' + i).classList.add('active');
  };
  tabsContainer.appendChild(tab);
  
  const m4 = s.months[3] || {};
  const detail = document.createElement('div');
  detail.className = 'store-detail' + (i === 0 ? ' active' : '');
  detail.id = 'detail-' + i;
  
  // Calculate key metrics
  const revenue = s.revenue;
  const cost = m4.cost?.actual_amount || 0;
  const grossProfit = m4.gross_profit?.actual_amount || 0;
  const adminExpense = m4.admin_expense?.actual_amount || 0;
  const netProfit = grossProfit - adminExpense;
  const netMargin = revenue > 0 ? netProfit / revenue : 0;
  
  detail.innerHTML = `
    <div class="kpi-grid" style="margin-top:16px;">
      <div class="kpi-card">
        <h3>4月营收</h3>
        <p class="value">${fmtMoney(revenue)}</p>
        <p class="change ${s.achievement >= 1 ? 'up' : 'down'}">达成 ${fmtPct(s.achievement)}</p>
      </div>
      <div class="kpi-card">
        <h3>毛利率</h3>
        <p class="value">${fmtPct(s.marginRate)}</p>
        <p class="change">预算 ${fmtPct(s.marginBudgetRate)}</p>
      </div>
      <div class="kpi-card">
        <h3>费用合计</h3>
        <p class="value">${fmtMoney(adminExpense)}</p>
        <p class="change">${fmtPct(revenue > 0 ? adminExpense / revenue : 0)}</p>
      </div>
      <div class="kpi-card">
        <h3>净利率</h3>
        <p class="value" style="color:${netMargin >= 0 ? 'var(--secondary)' : 'var(--primary)'}">${fmtPct(netMargin)}</p>
        <p class="change">${netMargin >= 0 ? '✅ 盈利' : '🔴 亏损'}</p>
      </div>
    </div>
    <div style="margin-top:20px;">
      <h3 style="font-size:15px;margin-bottom:12px;">📋 4月费用明细</h3>
      <table style="font-size:13px;">
        <tr><td style="text-align:left">薪资</td><td>${fmtMoney(m4.salary?.actual_amount || 0)}</td><td>${fmtPct(s.salaryPct)}</td></tr>
        <tr><td style="text-align:left">水电</td><td>${fmtMoney(m4.utilities?.actual_amount || 0)}</td><td>${fmtPct(revenue > 0 ? (m4.utilities?.actual_amount || 0) / revenue : 0)}</td></tr>
        <tr><td style="text-align:left">保险/社保</td><td>${fmtMoney(m4.insurance?.actual_amount || 0)}</td><td>${fmtPct(revenue > 0 ? (m4.insurance?.actual_amount || 0) / revenue : 0)}</td></tr>
        <tr><td style="text-align:left">宿舍</td><td>${fmtMoney(m4.rent?.actual_amount || 0)}</td><td>${fmtPct(revenue > 0 ? (m4.rent?.actual_amount || 0) / revenue : 0)}</td></tr>
        <tr><td style="text-align:left">福利</td><td>${fmtMoney(m4.benefits?.actual_amount || 0)}</td><td>${fmtPct(revenue > 0 ? (m4.benefits?.actual_amount || 0) / revenue : 0)}</td></tr>
        <tr><td style="text-align:left">低耗</td><td>${fmtMoney(m4.consumables?.actual_amount || 0)}</td><td>${fmtPct(revenue > 0 ? (m4.consumables?.actual_amount || 0) / revenue : 0)}</td></tr>
        <tr><td style="text-align:left">折旧</td><td>${fmtMoney(m4.depreciation?.actual_amount || 0)}</td><td>${fmtPct(revenue > 0 ? (m4.depreciation?.actual_amount || 0) / revenue : 0)}</td></tr>
      </table>
    </div>
  `;
  detailsContainer.appendChild(detail);
});
</script>
</body>
</html>
